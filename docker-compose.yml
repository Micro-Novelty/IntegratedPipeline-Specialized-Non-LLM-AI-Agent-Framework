version: '3.8'

services:
  # Agent 1 - Server (Port 5000)
  agent-1:
    build: .
    container_name: ai-agent-1
    image: integrated-agent:latest # downloaded image
    ports:
      - "5000:5000"
    environment:
      - AGENT_NAME=agent-1
      - AGENT_PORT=5000
      - AGENT_ROLE=server
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./certs:/app/certs  # For SSL certificates
    networks:
      - integrated-network
    command: python /app/data/multi_agent_server.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 5000), timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Agent 2 - Client (Port 5001)
  agent-2:
    build: .
    container_name: ai-agent-2
    image: integrated-agent:latest
    ports:
      - "5001:5001"
    environment:
      - AGENT_NAME=agent-2
      - AGENT_PORT=5001
      - AGENT_ROLE=client
      - PEER_ADDRESS=agent-1:5000
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./certs:/app/certs
    networks:
      - integrated-network
    command: python /app/data/multi_agent_client.py
    depends_on:
      agent-1:
        condition: service_healthy
    restart: unless-stopped

  # Agent 3 - Client (Port 5002)
  agent-3:
    build: .
    container_name: ai-agent-3
    image: integrated-agent:latest
    ports:
      - "5002:5002"
    environment:
      - AGENT_NAME=agent-3
      - AGENT_PORT=5002
      - AGENT_ROLE=client
      - PEER_ADDRESS=agent-1:5000
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./certs:/app/certs
    networks:
      - integrated-network
    command: python /app/data/multi_agent_client.py
    depends_on:
      agent-1:
        condition: service_healthy
    restart: unless-stopped

networks:
  integrated-network:
    driver: bridge

volumes:
  data:
  certs:
