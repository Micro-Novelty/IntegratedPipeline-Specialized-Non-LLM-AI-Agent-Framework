[build-system]
requires = ["setuptools>=61", "wheel", "numpy>=2.1.0", "cython", "setuptools-rust"]
build-backend = "setuptools.build_meta"

[project]
name = "AbstractIntegratedModule"
version = "0.9.8"
authors = [
    {name = "Micro-Novelty", email = "hernikpuspita5@gmail.com"},
]
description = "Integrated Pipeline with Specialized Non-LLM AI Agent Framework for ARM64 architecture"
readme = "readme-docs/README-AIM-1.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = ["numpy>=2.1.0"]

[project.urls]
Main-Repository =  "https://github.com/Micro-Novelty/IntegratedPipeline-Specialized-Non-LLM-AI-Agent-Framework"
Second-Repository = "https://github.com/Micro-Novelty/abstract-modules"
Releases =  "https://github.com/Micro-Novelty/abstract-modules/releases"
Issues =  "https://github.com/Micro-Novelty/IntegratedPipeline-Specialized-Non-LLM-AI-Agent-Framework/issues"
Open-PRs = "https://github.com/Micro-Novelty/IntegratedPipeline-Specialized-Non-LLM-AI-Agent-Framework/pulls"
Architecture-Docs = "https://github.com/Micro-Novelty/IntegratedPipeline-Specialized-Non-LLM-AI-Agent-Framework/blob/main/ARCHITECTURE.md"
Patched-Vulnerabilities = "https://github.com/Micro-Novelty/IntegratedPipeline-Specialized-Non-LLM-AI-Agent-Framework/blob/main/SECURITY.md"



