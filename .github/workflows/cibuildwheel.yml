name: Build wheels (cibuildwheel) for Linux and macOS (x86_64 + aarch64)

on:
  push:
    branches: [ main, master ]
    paths:
      - '**/*.pyx'
      - '**/Cargo.toml'
  pull_request:
    paths:
      - '**/*.pyx'
      - '**/Cargo.toml'
  workflow_dispatch:

jobs:
  build-rust-wheels:
    name: Build Rust wheels (abstract_weights_core)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Set up QEMU (for Linux aarch64)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v2
      
      - name: Build Rust wheels with maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust_optimization_
          args: --release --out dist
          maturin-version: latest
      
      - name: Upload Rust wheels
        uses: actions/upload-artifact@v4
        with:
          name: rust-wheels-${{ matrix.os }}
          path: rust_optimization_/dist/*.whl

  build-linux:
    name: manylinux wheels (x86_64 + aarch64)
    runs-on: ubuntu-latest
    needs: build-rust-wheels
    env:
      CIBW_PLATFORM: linux
      CIBW_ARCHS: "aarch64 x86_64"
      CIBW_BUILD: "cp310-* cp311-* cp312-*"
      CIBW_BEFORE_BUILD: "pip install numpy scikit-learn psutil aiohttp pandas"
      CIBW_TEST_COMMAND: "pip install numpy scikit-learn psutil aiohttp pandas && python -c \"import AbstractIntegratedModule as m; import AbstractOptimizedModules as o; print('OK', getattr(m, '__version__', 'OK'))\""
    steps:
      - uses: actions/checkout@v4

      - name: Download Rust wheels
        uses: actions/download-artifact@v4
        with:
          name: rust-wheels-ubuntu-latest
          path: rust-wheels

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v2

      - name: Install Rust wheels before build
        env:
          CIBW_BEFORE_BUILD: "pip install numpy scikit-learn psutil aiohttp pandas && pip install rust-wheels/*.whl || true"

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v4.0.0
        with:
          output-dir: wheelhouse

      - name: Upload wheelhouse artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: wheelhouse/*.whl

  build-macos:
    name: macOS wheels (arm64 + x86_64)
    runs-on: macos-latest
    needs: build-rust-wheels
    env:
      CIBW_PLATFORM: macos
      CIBW_OSX_ARCHS: "arm64 x86_64"
      CIBW_BUILD: "cp310-* cp311-* cp312-*"
      CIBW_BEFORE_BUILD: "pip install numpy scikit-learn psutil aiohttp pandas"
      CIBW_TEST_COMMAND: "pip install numpy scikit-learn psutil aiohttp pandas && python -c \"import AbstractIntegratedModule as m; import AbstractOptimizedModules as o; print('OK', getattr(m, '__version__', 'OK'))\""
    steps:
      - uses: actions/checkout@v4

      - name: Download Rust wheels
        uses: actions/download-artifact@v4
        with:
          name: rust-wheels-macos-latest
          path: rust-wheels

      - name: Install Rust wheels before build
        env:
          CIBW_BEFORE_BUILD: "pip install numpy scikit-learn psutil aiohttp pandas && pip install rust-wheels/*.whl || true"

      - name: Build wheels (cibuildwheel) on macOS
        uses: pypa/cibuildwheel@v4.0.0
        with:
          output-dir: wheelhouse

      - name: Upload wheelhouse artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: wheelhouse/*.whl
