name: Build wheels (cibuildwheel) for Linux and macOS (x86_64 + aarch64).

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.pyx' #.pyx
      - '**/*.rs'
      - '.github/workflows/cibuildwheel.yml' #ci
  pull_request:
    paths:
      - '**/*.pyx'
      - '**/*.rs'
      - '**/Cargo.toml'
      - 'build-configs/pyproject-AIM-*.toml'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Pre-generate Cython .c files ONCE
  # Avoids re-cythonizing inside every container
  # ─────────────────────────────────────────────
  cythonize:
    name: Pre-generate Cython C files
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Cython + numpy
        run: pip install "cython>=3.0" "numpy>=2.1.0"

      - name: Cythonize .pyx files
        run: |
          cython --version
          # Generate C files from all .pyx files under src/
          find src/ -name "*.pyx" | while read f; do
            echo "Cythonizing $f..."
            cython "$f"
          done

      # Upload generated .c files so every build job uses them
      - name: Upload Cython C files
        uses: actions/upload-artifact@v7
        with:
          name: cython-c-files
          path: src/*.c
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2: Build Rust extension wheels
  # One job per OS, builds all Python versions
  # in a single maturin invocation
  # ─────────────────────────────────────────────
  build-rust-wheels:
    name: Build Rust wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./rust_optimization_ -> target"

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install maturin
        run: pip install maturin

      - name: Build Rust wheels (all Python versions)
        working-directory: ./rust_optimization_
        run: |
          # Graceful sccache fallback — if GH cache is down, build anyway
          if sccache --start-server 2>/dev/null; then
            export RUSTC_WRAPPER=sccache
            export SCCACHE_GHA_ENABLED=true
            echo "✅ sccache enabled"
          else
            echo "⚠️ sccache unavailable, building without cache"
          fi

          maturin build --release \
            --interpreter python3.10 python3.11 python3.12

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Copy opt-README into Rust wheels output
        run: |
          if [ -f "readme-docs/opt-README.md" ]; then
            cp readme-docs/opt-README.md rust_optimization_/target/wheels/opt-README.md
            echo "✅ opt-README.md bundled with Rust wheels"
          else
            echo "⚠️ readme-docs/opt-README.md not found, skipping"
          fi

      - name: Upload Rust wheels
        uses: actions/upload-artifact@v7
        with:
          name: rust-wheels-${{ matrix.os }}
          path: |
            rust_optimization_/target/wheels/*.whl
            rust_optimization_/target/wheels/opt-README.md
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3a: Linux x86_64 — native runner
  # Uses pyproject-AIM-2.toml (x86_64 manylinux)
  # and pyproject-AIM-3.toml (x86_64 musllinux)
  # ─────────────────────────────────────────────
  build-linux-x86_64:
    name: Build Linux wheels (x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 500
    needs: [cythonize, build-rust-wheels]
    strategy:
      fail-fast: false
      matrix:
        include:
          - aim: AIM-2
            toml: build-configs/pyproject-AIM-2.toml
          - aim: AIM-3
            toml: build-configs/pyproject-AIM-3.toml
    env:
      CIBW_PLATFORM: linux
      CIBW_ARCHS: x86_64
      CIBW_BUILD: "cp310-* cp311-* cp312-*"
      CIBW_BUILD_FRONTEND: "build[uv]"
      CIBW_ENVIRONMENT: >
        RUST_WHEEL_DIR=/host/rust-wheels
      CIBW_BEFORE_ALL_LINUX: |
        set -euo pipefail
        echo "Detecting package manager..."
        if command -v yum >/dev/null 2>&1; then
          echo "yum detected — installing manylinux deps"
          yum install -y epel-release || true
          yum install -y openblas-devel blas-devel lapack-devel || true
        elif command -v apk >/dev/null 2>&1; then
          echo "apk detected — installing musllinux deps"
          apk add --no-cache openblas-dev lapack-dev build-base gfortran || true
        elif command -v apt-get >/dev/null 2>&1; then
          echo "apt-get detected — installing ubuntu/debian deps"
          apt-get update && apt-get install -y libopenblas-dev liblapack-dev build-essential gfortran || true
        else
          echo "No known package manager found; skipping system package installation"
        fi
        echo "Installing Python-level deps..."
        pip install numpy scikit-learn psutil aiohttp pandas || true
        if [ -d "${RUST_WHEEL_DIR:-/host/rust-wheels}" ] && ls "${RUST_WHEEL_DIR}"/*.whl >/dev/null 2>&1; then
          pip install "${RUST_WHEEL_DIR}"/*.whl || true
        else
          echo "No rust wheels found in ${RUST_WHEEL_DIR:-/host/rust-wheels}"
        fi
      CIBW_BEFORE_BUILD: >
        pip install "${RUST_WHEEL_DIR:-/tmp/rust-wheels}"/*.whl || true
      # Use manylinux_2_28 image — produces clean manylinux_2_28_x86_64 tag
      # without the legacy manylinux2014 compat dual tag
      CIBW_MANYLINUX_X86_64_IMAGE: "quay.io/pypa/manylinux_2_28_x86_64"
      CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
        auditwheel repair -w {dest_dir} {wheel} --only-plat
      CIBW_TEST_COMMAND: >
        python -c "import sys; print('✓ Python', sys.version, 'OK')"
      CIBW_CONTAINER_ENGINE: "docker"
    steps:
      - uses: actions/checkout@v4

      - name: Download Cython C files
        uses: actions/download-artifact@v8
        with:
          name: cython-c-files
          path: src/

      - name: Download Rust wheels (Linux x86_64)
        uses: actions/download-artifact@v8
        with:
          name: rust-wheels-ubuntu-latest
          path: /tmp/rust-wheels

      - name: Copy ${{ matrix.aim }} pyproject.toml to root
        run: |
          echo "Using ${{ matrix.toml }} as pyproject.toml"
          cp ${{ matrix.toml }} pyproject.toml

      - name: Debug rust-wheels on runner
        run: |
          echo "Contents of /tmp/rust-wheels on runner:"
          ls -la /tmp/rust-wheels || true
          echo "Will expect container mount at /host/rust-wheels"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheels (${{ matrix.aim }})
        uses: pypa/cibuildwheel@v2.22.0
        with:
          output-dir: wheelhouse
        env:
          CIBW_ENVIRONMENT: >
            RUST_WHEEL_DIR=/host/rust-wheels
          CIBW_BEFORE_BUILD: >
            pip install /tmp/rust-wheels/*.whl || true

      - name: Copy README for ${{ matrix.aim }} into wheelhouse
        run: |
          mkdir -p wheelhouse/docs
          if [ -f "readme-docs/README-${{ matrix.aim }}.md" ]; then
            cp readme-docs/README-${{ matrix.aim }}.md wheelhouse/docs/README-${{ matrix.aim }}.md
          fi

      - name: Upload wheels (${{ matrix.aim }})
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-x86_64-${{ matrix.aim }}
          path: |
            wheelhouse/*.whl
            wheelhouse/docs/*.md

  # ─────────────────────────────────────────────
  # JOB 3b: Linux aarch64 — NATIVE ARM runner
  # Uses pyproject-AIM-1.toml (cp310/cp311)
  # and pyproject-AIM-2.toml (cp312 aarch64)
  # ─────────────────────────────────────────────
  build-linux-aarch64:
    name: Build Linux wheels (aarch64)
    runs-on: ubuntu-24.04-arm  # ✅ native ARM64, not emulated
    timeout-minutes: 500
    # Skip aarch64 on PRs — only run on push/tag/manual
    if: github.event_name != 'pull_request'
    needs: [cythonize, build-rust-wheels]
    strategy:
      fail-fast: false
      matrix:
        include:
          - aim: AIM-1
            toml: build-configs/pyproject-AIM-1.toml
          - aim: AIM-2
            toml: build-configs/pyproject-AIM-2.toml
    env:
      CIBW_PLATFORM: linux
      CIBW_ARCHS: aarch64
      CIBW_BUILD: "cp310-* cp311-* cp312-*"
      CIBW_BUILD_FRONTEND: "build[uv]"
      CIBW_ENVIRONMENT: >
        RUST_WHEEL_DIR=/host/rust-wheels
      CIBW_BEFORE_ALL_LINUX: |
        set -euo pipefail
        echo "Detecting package manager..."
        if command -v yum >/dev/null 2>&1; then
          echo "yum detected — installing manylinux deps"
          yum install -y epel-release || true
          yum install -y openblas-devel blas-devel lapack-devel || true
        elif command -v apk >/dev/null 2>&1; then
          echo "apk detected — installing musllinux deps"
          apk add --no-cache openblas-dev lapack-dev build-base gfortran || true
        elif command -v apt-get >/dev/null 2>&1; then
          echo "apt-get detected — installing ubuntu/debian deps"
          apt-get update && apt-get install -y libopenblas-dev liblapack-dev build-essential gfortran || true
        else
          echo "No known package manager found; skipping system package installation"
        fi
        echo "Installing Python-level deps..."
        pip install numpy scikit-learn psutil aiohttp pandas || true
        if [ -d "${RUST_WHEEL_DIR:-/host/rust-wheels}" ] && ls "${RUST_WHEEL_DIR}"/*.whl >/dev/null 2>&1; then
          pip install "${RUST_WHEEL_DIR}"/*.whl || true
        else
          echo "No rust wheels found in ${RUST_WHEEL_DIR:-/host/rust-wheels}"
        fi
      CIBW_BEFORE_BUILD: >
        pip install "${RUST_WHEEL_DIR:-/tmp/rust-wheels}"/*.whl || true
      CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
        auditwheel repair -w {dest_dir} {wheel}
      CIBW_TEST_COMMAND: >
        python -c "import sys; print('✓ Python', sys.version, 'OK')"
    steps:
      - uses: actions/checkout@v4

      - name: Download Cython C files
        uses: actions/download-artifact@v8
        with:
          name: cython-c-files
          path: src/

      - name: Download Rust wheels (Linux aarch64)
        uses: actions/download-artifact@v8
        with:
          name: rust-wheels-ubuntu-24.04-arm
          path: /tmp/rust-wheels

      - name: Copy ${{ matrix.aim }} pyproject.toml to root
        run: |
          echo "Using ${{ matrix.toml }} as pyproject.toml"
          cp ${{ matrix.toml }} pyproject.toml

      - name: Debug rust-wheels on runner
        run: |
          echo "Contents of /tmp/rust-wheels on runner:"
          ls -la /tmp/rust-wheels || true
          echo "Will expect container mount at /host/rust-wheels"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheels (${{ matrix.aim }})
        uses: pypa/cibuildwheel@v2.22.0
        with:
          output-dir: wheelhouse

      - name: Copy README for ${{ matrix.aim }} into wheelhouse
        run: |
          mkdir -p wheelhouse/docs
          if [ -f "readme-docs/README-${{ matrix.aim }}.md" ]; then
            cp readme-docs/README-${{ matrix.aim }}.md wheelhouse/docs/README-${{ matrix.aim }}.md
          fi

      - name: Upload wheels (${{ matrix.aim }})
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-aarch64-${{ matrix.aim }}
          path: |
            wheelhouse/*.whl
            wheelhouse/docs/*.md

  # ─────────────────────────────────────────────
  # JOB 3c: Linux aarch64 — regular build
  # Uses build-configs/pyproject.toml (GitHub README)
  # manylinux + musllinux, cp310–cp312
  # ─────────────────────────────────────────────
  build-linux-aarch64-regular:
    name: Build Linux wheels (aarch64, regular)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 500
    if: github.event_name != 'pull_request'
    needs: [cythonize, build-rust-wheels]
    env:
      CIBW_PLATFORM: linux
      CIBW_ARCHS: aarch64
      CIBW_BUILD: "cp310-* cp311-* cp312-*"
      CIBW_BUILD_FRONTEND: "build[uv]"
      CIBW_ENVIRONMENT: >
        RUST_WHEEL_DIR=/host/rust-wheels
      CIBW_BEFORE_ALL_LINUX: |
        set -euo pipefail
        echo "Detecting package manager..."
        if command -v yum >/dev/null 2>&1; then
          echo "yum detected — installing manylinux deps"
          yum install -y epel-release || true
          yum install -y openblas-devel blas-devel lapack-devel || true
        elif command -v apk >/dev/null 2>&1; then
          echo "apk detected — installing musllinux deps"
          apk add --no-cache openblas-dev lapack-dev build-base gfortran || true
        elif command -v apt-get >/dev/null 2>&1; then
          echo "apt-get detected — installing ubuntu/debian deps"
          apt-get update && apt-get install -y libopenblas-dev liblapack-dev build-essential gfortran || true
        else
          echo "No known package manager found; skipping system package installation"
        fi
        echo "Installing Python-level deps..."
        pip install numpy scikit-learn psutil aiohttp pandas || true
        if [ -d "${RUST_WHEEL_DIR:-/host/rust-wheels}" ] && ls "${RUST_WHEEL_DIR}"/*.whl >/dev/null 2>&1; then
          pip install "${RUST_WHEEL_DIR}"/*.whl || true
        else
          echo "No rust wheels found in ${RUST_WHEEL_DIR:-/host/rust-wheels}"
        fi
      CIBW_BEFORE_BUILD: >
        pip install "${RUST_WHEEL_DIR:-/tmp/rust-wheels}"/*.whl || true
      CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
        auditwheel repair -w {dest_dir} {wheel}
      CIBW_TEST_COMMAND: >
        python -c "import sys; print('✓ Python', sys.version, 'OK')"
    steps:
      - uses: actions/checkout@v4

      - name: Download Cython C files
        uses: actions/download-artifact@v8
        with:
          name: cython-c-files
          path: src/

      - name: Download Rust wheels (Linux aarch64)
        uses: actions/download-artifact@v8
        with:
          name: rust-wheels-ubuntu-24.04-arm
          path: /tmp/rust-wheels

      - name: Copy regular pyproject.toml to root
        run: |
          echo "Using build-configs/pyproject.toml as pyproject.toml"
          cp build-configs/pyproject.toml pyproject.toml

      - name: Debug rust-wheels on runner
        run: |
          echo "Contents of /tmp/rust-wheels on runner:"
          ls -la /tmp/rust-wheels || true
          echo "Will expect container mount at /host/rust-wheels"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheels (regular aarch64)
        uses: pypa/cibuildwheel@v2.22.0
        with:
          output-dir: wheelhouse

      - name: Upload wheels (regular aarch64)
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-aarch64-regular
          path: wheelhouse/*.whl

  # ─────────────────────────────────────────────
  # JOB 4: macOS — x86_64 + arm64
  # Uses pyproject-AIM-4.toml
  # ─────────────────────────────────────────────
  build-macos:
    name: Build macOS wheels (x86_64 + arm64)
    runs-on: macos-latest
    timeout-minutes: 30
    needs: [cythonize, build-rust-wheels]
    env:
      CIBW_PLATFORM: macos
      CIBW_ARCHS: "x86_64 arm64"
      CIBW_BUILD: "cp310-* cp311-* cp312-*"
      CIBW_BUILD_FRONTEND: "build[uv]"
      CIBW_BEFORE_ALL_MACOS: >
        pip install numpy scikit-learn psutil aiohttp pandas
      CIBW_BEFORE_BUILD: >
        pip install /tmp/rust-wheels/*.whl || true
      CIBW_TEST_COMMAND: >
        python -c "import sys; print('✓ Python', sys.version, 'OK')"
      # Skip test for cross-compiled x86 wheels on ARM runner
      CIBW_TEST_SKIP: "*-macosx_x86_64"
    steps:
      - uses: actions/checkout@v4

      - name: Download Cython C files
        uses: actions/download-artifact@v8
        with:
          name: cython-c-files
          path: src/

      - name: Download Rust wheels (macOS)
        uses: actions/download-artifact@v8
        with:
          name: rust-wheels-macos-latest
          path: /tmp/rust-wheels

      - name: Copy AIM-4 pyproject.toml to root
        run: |
          echo "Using build-configs/pyproject-AIM-4.toml as pyproject.toml"
          cp build-configs/pyproject-AIM-4.toml pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheels (AIM-4)
        uses: pypa/cibuildwheel@v2.22.0
        with:
          output-dir: wheelhouse

      - name: Copy README for AIM-4 into wheelhouse
        run: |
          mkdir -p wheelhouse/docs
          if [ -f "readme-docs/README-AIM-4.md" ]; then cp readme-docs/README-AIM-4.md wheelhouse/docs/README-AIM-4.md; fi

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos
          path: |
            wheelhouse/*.whl
            wheelhouse/docs/*.md

  # ─────────────────────────────────────────────
  # JOB 5: Collect all wheels into one artifact
  # ─────────────────────────────────────────────
  collect-wheels:
    name: Collect all wheels
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()
    needs: [build-linux-x86_64, build-linux-aarch64, build-linux-aarch64-regular, build-macos]
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: all-wheels/

      - name: List built wheels and docs
        run: |
          echo "=== Built artifacts (top-level) ==="
          ls -Rall all-wheels/ || true
          echo "=== Found wheels count ==="
          find all-wheels -name '*.whl' -print | wc -l || true
          echo "=== Found README docs ==="
          find all-wheels -type f -name 'README-AIM-*.md' -print || true

      - name: Gather wheels and README docs into all-wheels root
        run: |
          set -euo pipefail
          mkdir -p all-wheels/docs
          find all-wheels -name '*.whl' -exec cp {} all-wheels/ \; || true
          find all-wheels -type f -name 'README-AIM-*.md' -exec cp {} all-wheels/docs/ \; || true
          echo "After gather:"
          ls -lah all-wheels/ || true
          ls -lah all-wheels/docs/ || true

      - name: Upload combined artifact
        uses: actions/upload-artifact@v7
        with:
          name: all-wheels
          path: |
            all-wheels/*.whl
            all-wheels/docs/*.md
          retention-days: 30
