name: Build wheels (cibuildwheel) for Linux and macOS (x86_64 + aarch64)

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.pyx'
      - '**/Cargo.toml'
      - '.github/workflows/cibuildwheel.yml'
  pull_request:
    paths:
      - '**/*.pyx'
      - '**/Cargo.toml'
  workflow_dispatch:

jobs:
  build-rust-wheels:
    name: Build Rust wheels (abstract_weights_core)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up QEMU (for Linux aarch64)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v2

      - name: Build Rust wheels with maturin
        uses: PyO3/maturin-action@v1
        with:
          working-dir: rust_optimization_
          command: build
          args: --release
          maturin-version: latest

      - name: Upload Rust wheels
        uses: actions/upload-artifact@v4
        with:
          name: rust-wheels-${{ matrix.os }}
          path: rust_optimization_/target/wheels/*.whl

  build-linux:
    name: Build Linux wheels (x86_64 + aarch64)
    runs-on: ubuntu-latest
    needs: build-rust-wheels
    env:
      CIBW_PLATFORM: linux
      CIBW_ARCHS: "x86_64 aarch64"
      CIBW_BUILD: "cp310-* cp311-* cp312-*"
      CIBW_SKIP: "pp*"
      CIBW_BEFORE_BUILD: |
        pip install numpy scikit-learn psutil aiohttp pandas
        pip install --find-links rust-wheels abstract_weights_core || true
      CIBW_TEST_COMMAND: "python -c \"import AbstractIntegratedModule; import AbstractOptimizedModules; print('✓ Modules imported successfully')\""
    steps:
      - uses: actions/checkout@v4

      - name: Download Rust wheels
        uses: actions/download-artifact@v4
        with:
          name: rust-wheels-ubuntu-latest
          path: rust-wheels

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v2

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v4.0.0
        with:
          output-dir: wheelhouse

      - name: Upload wheelhouse artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: wheelhouse/*.whl

  build-macos:
    name: Build macOS wheels (arm64 + x86_64)
    runs-on: macos-latest
    needs: build-rust-wheels
    env:
      CIBW_PLATFORM: macos
      CIBW_ARCHS: "x86_64 arm64"
      CIBW_BUILD: "cp310-* cp311-* cp312-*"
      CIBW_SKIP: "pp*"
      CIBW_BEFORE_BUILD: |
        pip install numpy scikit-learn psutil aiohttp pandas
        pip install --find-links rust-wheels abstract_weights_core || true
      CIBW_TEST_COMMAND: "python -c \"import AbstractIntegratedModule; import AbstractOptimizedModules; print('✓ Modules imported successfully')\""
    steps:
      - uses: actions/checkout@v4

      - name: Download Rust wheels
        uses: actions/download-artifact@v4
        with:
          name: rust-wheels-macos-latest
          path: rust-wheels

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v4.0.0
        with:
          output-dir: wheelhouse

      - name: Upload wheelhouse artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: wheelhouse/*.whl

  publish:
    name: Publish wheels (optional)
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
