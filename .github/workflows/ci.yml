name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Cython setuptools numpy scikit-learn scipy pandas joblib cryptography aiohttp psutil
      
      - name: Compile Cython extensions
        run: |
          python linux_setup.py build_ext --inplace
      
      - name: Verify compilation
        run: |
          python -c "import AbstractIntegratedModule; print('✓ Cython compilation successful')"
      
      - name: Upload compiled extensions
        uses: actions/upload-artifact@v4
        with:
          name: compiled-extensions
          path: |
            AbstractIntegratedModule.so
            AbstractOptimizedModules.so
          retention-days: 30
