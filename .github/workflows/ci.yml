name: CI Compiler for Cross-platform

on:
  push:
    branches: [ main ]
    paths:
      - '*.yml'
      - 'src/*.pyx'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/*.pyx'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — .so output
          - os: ubuntu-latest
            python-version: '3.10'
            arch: x86_64
            artifact-suffix: linux-x86_64-cp310
          - os: ubuntu-latest
            python-version: '3.11'
            arch: x86_64
            artifact-suffix: linux-x86_64-cp311
          - os: ubuntu-latest
            python-version: '3.12'
            arch: x86_64
            artifact-suffix: linux-x86_64-cp312
          # macOS — .so output
          - os: macos-latest
            python-version: '3.10'
            arch: arm64
            artifact-suffix: macos-cp310
          - os: macos-latest
            python-version: '3.11'
            arch: arm64
            artifact-suffix: macos-cp311
          - os: macos-latest
            python-version: '3.12'
            arch: arm64
            artifact-suffix: macos-cp312
          # Windows — .pyd output
          - os: windows-latest
            python-version: '3.10'
            arch: x86_64
            artifact-suffix: windows-x86_64-cp310
          - os: windows-latest
            python-version: '3.11'
            arch: x86_64
            artifact-suffix: windows-x86_64-cp311
          - os: windows-latest
            python-version: '3.12'
            arch: x86_64
            artifact-suffix: windows-x86_64-cp312

    runs-on: ${{ matrix.os }}

    env:
      PYTHONUTF8: "1"  # Fix Windows emoji/Unicode encoding issues across all steps

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc

      - name: Set compiler flags (macOS)
        if: runner.os == 'macOS'
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            echo "CFLAGS=-O2 -arch arm64" >> $GITHUB_ENV
            echo "ARCHFLAGS=-arch arm64" >> $GITHUB_ENV
          else
            echo "CFLAGS=-O2 -march=native" >> $GITHUB_ENV
            echo "ARCHFLAGS=-arch x86_64" >> $GITHUB_ENV
          fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Cython setuptools numpy scikit-learn scipy pandas joblib cryptography aiohttp psutil

      - name: Compile Cython extensions
        run: |
          python linux_setup.py build_ext --inplace

      - name: Verify compilation and locate extension files (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python -c "import AbstractIntegratedModule; print('✓ Cython compilation successful')"
          echo "=== Compiled .so files ==="
          find . -name "*.so" -type f -exec ls -lh {} \;

      - name: Verify compilation and locate extension files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -c "import AbstractIntegratedModule; print('✓ Cython compilation successful')"
          Write-Host "=== Compiled .pyd files ==="
          Get-ChildItem -Recurse -Filter "*.pyd" | Select-Object FullName, Length

      - name: Upload compiled extensions (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: compiled-extensions-${{ matrix.artifact-suffix }}
          path: |
            **/*.so
          retention-days: 30

      - name: Upload compiled extensions (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: compiled-extensions-${{ matrix.artifact-suffix }}
          path: |
            **/*.pyd
          retention-days: 30
