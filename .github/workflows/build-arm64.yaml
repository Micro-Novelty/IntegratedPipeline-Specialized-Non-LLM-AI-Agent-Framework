name: Build ARM64 .so File

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cython numpy

      - name: Build .so file
        run: |
          rm -rf build/ *.so *.c
          python linux_setup.py build_ext --inplace

      - name: Upload ARM64 .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: AbstractIntegratedModule-arm64-build
          path: |
            *.so
