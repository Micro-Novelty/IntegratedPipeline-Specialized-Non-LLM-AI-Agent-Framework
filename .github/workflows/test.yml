name: Tests

on:
  push:
    branches: [ main ]
    paths:
      - '**.pyx'
      - 'requirements.txt'
      - 'linux_setup.py'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.pyx'
      - 'requirements.txt'
      - 'linux_setup.py'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
        exclude:
          # Reduce matrix size - test Python 3.9 only on Linux
          - os: windows-latest
            python-version: '3.9'
          - os: macos-latest
            python-version: '3.9'

    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev
      
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install build-essential
      
      - name: Upgrade pip
        run: python -m pip install --upgrade pip wheel setuptools
      
      - name: Install dependencies
        run: |
          pip install Cython numpy scikit-learn scipy pandas joblib cryptography aiohttp psutil
          pip install pytest pytest-cov pytest-xdist
      
      - name: Compile Cython extensions
        run: python linux_setup.py build_ext --inplace
      
      - name: Run tests with pytest
        run: pytest tests/ -v --cov=AbstractIntegratedModule --cov=AbstractOptimizedModules --cov-report=xml --cov-report=html -n auto
        continue-on-error: true
      
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
