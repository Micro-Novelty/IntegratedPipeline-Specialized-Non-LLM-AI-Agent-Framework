name: Build and Verify artifacts (no PyPI publish)

on:
  release:
    types: [published]
  workflow_dispatch:        # allows manual trigger from GitHub UI for testing

jobs:
  # Build wheels for every platform you ship .so/.pyd for
  build:
    name: Build wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false        # one platform failing shouldn't cancel the others
      matrix:
        include:
          - os: windows-latest
            platform_id: win_amd64
          - os: ubuntu-latest
            platform_id: manylinux_x86_64
          - os: ubuntu-24.04-arm
            platform_id: manylinux_aarch64
          - os: macos-latest
            platform_id: macosx_arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cython numpy setuptools wheel build

      - name: Build Cython extensions in-place
        run: |
          python setup.py build_ext --inplace

      - name: Verify Cython extension loaded correctly
        run: |
          python -c "
          import AbstractOptimizedModules as f
          print('Cython module loaded:', [x for x in dir(f) if not x.startswith('_')])
          assert hasattr(f, 'optimized_ame_encoder'), 'Missing expected function — partial compile detected'
          print('Verification passed')
          "
        continue-on-error: false

      - name: Build wheel
        run: python -m build --wheel

      - name: Verify wheel contents
        shell: bash
        run: |
          python -m pip install --upgrade twine
          twine check dist/*.whl
          python -c "
          import zipfile, glob
          wheel = glob.glob('dist/*.whl')[0]
          with zipfile.ZipFile(wheel) as z:
              names = z.namelist()
              has_so_or_pyd = any(n.endswith(('.so', '.pyd')) for n in names)
              print(f'Wheel: {wheel}')
              print(f'Contains compiled extension: {has_so_or_pyd}')
              assert has_so_or_pyd, 'No compiled extension found in wheel!'
          "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.platform_id }}
          path: dist/*.whl
          if-no-files-found: error

  # Build the source distribution (sdist) once, platform independent
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tool
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # Verify artifacts (no publishing)
  verify:
    name: Verify artifacts and run tests
    needs: [build, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: '**'
          merge-multiple: true

      - name: List collected files
        run: ls -la dist/

      - name: Install system build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev

      - name: Install verification tools and test deps
        run: |
          python -m pip install --upgrade pip
          pip install twine pytest pytest-cov

      - name: Run twine check on distributions
        run: |
          python -m pip install --upgrade twine
          twine check dist/* || true

      - name: Inspect wheel contents for compiled extensions
        shell: bash
        run: |
          python - <<'PY'
          

