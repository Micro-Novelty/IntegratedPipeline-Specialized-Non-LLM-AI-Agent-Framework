name: Build and Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:        # allows manual trigger from GitHub UI for testing

jobs:
  # ──────────────────────────────────────────────
  # Build wheels for every platform you ship .so/.pyd for
  # ──────────────────────────────────────────────
  build:
    name: Build wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false        # one platform failing shouldn't cancel the others
      matrix:
        include:
          - os: windows-latest
            platform_id: win_amd64
          - os: ubuntu-latest
            platform_id: manylinux_x86_64
          - os: ubuntu-24.04-arm
            platform_id: manylinux_aarch64
          - os: macos-latest
            platform_id: macosx_arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cython numpy setuptools wheel build

      - name: Build Cython extensions in-place
        run: |
          python setup.py build_ext --inplace

      - name: Verify Cython extension loaded correctly
        run: |
          python -c "
          import AbstractOptimizedModules as f
          print('Cython module loaded:', [x for x in dir(f) if not x.startswith('_')])
          assert hasattr(f, 'optimized_ame_encoder'), 'Missing expected function — partial compile detected'
          print('Verification passed')
          "

      - name: Build wheel
        run: python -m build --wheel

      - name: Verify wheel contents
        shell: bash
        run: |
          python -m pip install --upgrade twine
          twine check dist/*.whl
          python -c "
          import zipfile, glob
          wheel = glob.glob('dist/*.whl')[0]
          with zipfile.ZipFile(wheel) as z:
              names = z.namelist()
              has_so_or_pyd = any(n.endswith(('.so', '.pyd')) for n in names)
              print(f'Wheel: {wheel}')
              print(f'Contains compiled extension: {has_so_or_pyd}')
              assert has_so_or_pyd, 'No compiled extension found in wheel!'
          "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform_id }}
          path: dist/*.whl
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Build the source distribution (sdist) once, platform independent
  # ──────────────────────────────────────────────
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tool
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Publish to TestPyPI first — sanity check before the real release
  # ──────────────────────────────────────────────
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build, build-sdist]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: '*'
          merge-multiple: true

      - name: List collected files
        run: ls -la dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ──────────────────────────────────────────────
  # Publish to real PyPI — only runs after TestPyPI succeeds
  # ──────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      attestations: write
      contents: read

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: '*'
          merge-multiple: true

      - name: List collected files
        run: ls -la dist/

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'dist/*'

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
